name: Test Scraper

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: prod
    env:
      BASE_DIR: ${{ github.workspace }}
      PYTHONPATH: .

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test scraper
        run: python src/test_scraper.py

      - name: Show test output
        run: cat data/test/test_output.csv

      - name: Commit and push test CSV
        run: |
          git config --local user.email "mate.mrse@gmail.com"
          git config --local user.name "GitHub Action"
          git add -f data/test/
          git commit -m "test scraper: updated test data" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
