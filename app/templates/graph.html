<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peludni graf</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Graf koncentracije peludi</h1>
      <p class="subtitle">Vizualni prikaz dnevnih mjerenja</p>
      <a href="/" class="nav-link" data-icon="&#x2937;">Tablični prikaz</a>
    </div>

    <div class="filter-card">
      <form id="filter-form">
        <div class="filter-group">
          <label for="city-select">Grad</label>
          <select id="city-select">
            {% for city in cities %}
            <option value="{{ city }}" {% if city == 'Zagreb' or (loop.first and 'Zagreb' not in cities) %}selected{% endif %}>{{ city }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="filter-group">
          <label for="date-from">Od</label>
          <input type="date" id="date-from">
        </div>

        <div class="filter-group">
          <label for="date-to">Do</label>
          <input type="date" id="date-to">
        </div>

        <button type="button" id="apply-btn" class="btn">Primijeni</button>
      </form>
    </div>

    <p id="error-msg" class="error-msg" style="display:none"></p>
    <p id="no-data-msg" class="no-data-msg" style="display:none">Nema podataka za ovaj odabir.</p>

    <div id="chart-wrapper" class="chart-card" style="display:none">
      <canvas id="pollen-chart"></canvas>
    </div>
  </div>

  <script>
    const PALETTE = [
      '#2d5a42','#d4a843','#c0392b','#2980b9','#7c3aed',
      '#0891b2','#be185d','#92400e','#16a34a','#1a3a2a'
    ];

    let chart = null;

    function formatDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    async function fetchAndRender() {
      const errorMsg = document.getElementById('error-msg');
      const noDataMsg = document.getElementById('no-data-msg');
      const chartWrapper = document.getElementById('chart-wrapper');
      const canvas = document.getElementById('pollen-chart');

      try {
        const city = document.getElementById('city-select').value;
        if (!city) {
          errorMsg.textContent = 'Nema dostupnih gradova';
          errorMsg.style.display = '';
          return;
        }

        const dateFrom = document.getElementById('date-from').value;
        const dateTo = document.getElementById('date-to').value;

        if (dateFrom > dateTo) {
          errorMsg.textContent = 'Početni datum ne smije biti nakon završnog';
          errorMsg.style.display = '';
          return;
        }

        errorMsg.style.display = 'none';

        const url = `/api/graph-data?city=${encodeURIComponent(city)}&date_from=${dateFrom}&date_to=${dateTo}`;
        const resp = await fetch(url);

        if (!resp.ok) {
          let msg = 'Zahtjev nije uspio';
          try { msg = (await resp.json()).error || msg; } catch (_) {}
          errorMsg.textContent = msg;
          errorMsg.style.display = '';
          chartWrapper.style.display = 'none';
          noDataMsg.style.display = 'none';
          return;
        }

        const rows = await resp.json();

        if (rows.length === 0) {
          if (chart) { chart.destroy(); chart = null; }
          chartWrapper.style.display = 'none';
          noDataMsg.style.display = '';
          return;
        }

        noDataMsg.style.display = 'none';
        errorMsg.style.display = 'none';
        chartWrapper.style.display = '';

        const byPlant = {};
        for (const row of rows) {
          if (!byPlant[row.plant]) byPlant[row.plant] = {};
          byPlant[row.plant][row.date] = row.concentration;
        }

        const dates = [...new Set(rows.map(r => r.date))].sort();
        const labels = dates;

        const datasets = Object.entries(byPlant).map(([plant, dateMap], i) => {
          const color = PALETTE[i % PALETTE.length];
          return {
            label: plant,
            data: dates.map(d => dateMap[d] ?? null),
            borderColor: color,
            backgroundColor: color + '18',
            tension: 0.35,
            spanGaps: true,
            pointRadius: 4,
            pointHoverRadius: 6,
            borderWidth: 2.5
          };
        });

        if (chart) chart.destroy();
        chart = new Chart(canvas, {
          type: 'line',
          data: { labels, datasets },
          options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: {
                position: 'bottom',
                labels: {
                  boxWidth: 14,
                  padding: 20,
                  font: { family: 'Outfit', size: 13 },
                  usePointStyle: true,
                  pointStyle: 'circle'
                }
              },
              tooltip: {
                backgroundColor: '#1a3a2a',
                titleFont: { family: 'Outfit', weight: '500' },
                bodyFont: { family: 'Outfit' },
                cornerRadius: 8,
                padding: 12
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                title: { display: true, text: 'Koncentracija', font: { family: 'Outfit', size: 12, weight: '500' }, color: '#6b6b6b' },
                grid: { color: 'rgba(0,0,0,0.04)' },
                ticks: { font: { family: 'Outfit', size: 11 }, color: '#6b6b6b' }
              },
              x: {
                type: 'category',
                title: { display: true, text: 'Datum', font: { family: 'Outfit', size: 12, weight: '500' }, color: '#6b6b6b' },
                grid: { display: false },
                ticks: {
                  font: { family: 'Outfit', size: 11 },
                  color: '#6b6b6b',
                  callback: function(val) { return parseInt(this.getLabelForValue(val).split('-')[2], 10) + '.'; }
                }
              }
            }
          }
        });

      } catch (err) {
        errorMsg.textContent = 'Greška mreže';
        errorMsg.style.display = '';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const today = new Date();
      const firstOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      const lastOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);
      document.getElementById('date-from').value = formatDate(firstOfMonth);
      document.getElementById('date-to').value = formatDate(lastOfMonth);

      document.getElementById('apply-btn').addEventListener('click', () => { fetchAndRender(); });

      fetchAndRender();
    });
  </script>
</body>
</html>
