<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Peludni podaci</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>Peludni podaci po mjesecu i gradu</h1>
    <p><a href="/graph">Graf</a></p>
    <form method="GET" action="/">
        <label for="city">Grad:</label>
        <select name="city" id="city">
            <option value="">Svi gradovi</option>
            {% for city in cities %}
            <option value="{{ city }}" {% if city == selected_city %}selected{% endif %}>{{ city }}</option>
            {% endfor %}
        </select>

        <label for="plant">Biljka:</label>
        <select name="plant" id="plant">
            <option value="">Sve biljke</option>
            {% for plant in plants %}
            <option value="{{ plant }}" {% if plant == selected_plant %}selected{% endif %}>{{ plant }}</option>
            {% endfor %}
        </select>

        <label for="month">Mjesec:</label>
        <select name="month" id="month">
            <option value="">Svi mjeseci</option>
            {% for month in months %}
            <option value="{{ month }}" {% if month == selected_month %}selected{% endif %}>{{ month }}</option>
            {% endfor %}
        </select>

        <button type="submit">Filtriraj</button>
    </form>
    <table border="1">
        <thead>
            <tr>
                <th>Grad</th>
                <th>Biljka</th>
                <th>Koncentracija peludi</th>
                <th>Datum</th>
            </tr>
        </thead>
        <tbody>
            {% for row in data %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
